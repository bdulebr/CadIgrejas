<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Etiqueta {{ item.id_unico }}</title>
    <style>
        @page {
            size: 15cm 10cm; /* Tamanho comum de etiqueta grande */
            margin: 0.5cm;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            color: #000;
        }
        .container {
            width: 100%;
            height: 100%;
            border: 2px solid #000;
            box-sizing: border-box;
            padding: 10px;
            text-align: center;
        }
        .header {
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .titulo {
            font-size: 24px;
            font-weight: bold;
            margin: 0;
            text-transform: uppercase;
        }
        .patrimonio {
            font-size: 18px;
            margin: 5px 0 0 0;
        }
        .qr-container {
            width: 100%;
        }
        .qr-box {
            width: 45%;
            display: inline-block;
            vertical-align: top;
            text-align: center;
        }
        .qr-image {
            width: 100px;
            height: 100px;
        }
        .qr-label {
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
        }
        .footer {
            margin-top: 20px;
            font-size: 10px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="titulo">{{ item.nome }}</h1>
            <p class="patrimonio">PATRIMÔNIO ID: <b>{{ item.id_unico }}</b></p>
        </div>
        
        <div class="qr-container">
            <div class="qr-box">
                <img src="data:image/png;base64,{{ qr_retirar_b64 }}" class="qr-image">
                <p class="qr-label">1. RETIRAR ITEM</p>
            </div>
            
            <div class="qr-box">
                <img src="data:image/png;base64,{{ qr_devolver_b64 }}" class="qr-image">
                <p class="qr-label">2. DEVOLVER ITEM</p>
            </div>
        </div>
        
        <div class="footer">
            Ao ler o QR Code com a câmera do celular, o sistema registrará a movimentação automaticamente.<br>
            Igreja Palavra de Vida Enseada - Gestão Zero-Trust
        </div>
    </div>
</body>
</html>
