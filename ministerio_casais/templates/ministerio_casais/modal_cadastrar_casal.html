<div x-data="{ open: false }" @open-modal.window="if ($event.detail === 'modal-cadastrar-casal') open = true" @keydown.escape.window="open = false" x-show="open" style="display: none;" class="fixed inset-0 z-[99999] overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div x-show="open" class="fixed inset-0 bg-gray-950/80 backdrop-blur-sm transition-opacity" @click="open = false"></div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
        <div x-show="open" class="inline-block align-bottom bg-gray-900 border border-gray-700 rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl w-full">
            <form action="{% url 'cadastrar_casal' %}" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="px-6 py-6 border-b border-gray-800">
                    <h3 class="text-xl font-bold text-white flex items-center gap-2">
                        <i data-lucide="user-plus" class="w-5 h-5 text-pink-500"></i> Cadastrar Novo Casal
                    </h3>
                </div>
                <div class="px-6 py-6 space-y-6">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Nome Cônjuge 1 (Principal)</label>
                            <input type="text" name="nome_conjuge_1" required placeholder="Ex: João da Silva" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:ring-2 focus:ring-pink-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Nome Cônjuge 2</label>
                            <input type="text" name="nome_conjuge_2" required placeholder="Ex: Maria Souza" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:ring-2 focus:ring-pink-500 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Status de Relacionamento</label>
                            <select name="status_relacionamento" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:ring-2 focus:ring-pink-500 outline-none">
                                <option value="Casados">Casados</option>
                                <option value="Noivos">Noivos</option>
                                <option value="Namorados">Namorados</option>
                                <option value="Em Crise">Em Crise</option>
                                <option value="Separados">Separados</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Aniversário de Casamento (Bodas)</label>
                            <input type="date" name="data_aniversario_casamento" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-pink-500 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">E-mail Cônjuge 1</label>
                            <input type="email" name="email_1" placeholder="joao@email.com" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:ring-2 focus:ring-pink-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">E-mail Cônjuge 2</label>
                            <input type="email" name="email_2" placeholder="maria@email.com" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:ring-2 focus:ring-pink-500 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Telefone Cônjuge 1 (WhatsApp)</label>
                            <input type="text" name="telefone_1" placeholder="(11) 99999-9999" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:ring-2 focus:ring-pink-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Telefone Cônjuge 2 (WhatsApp)</label>
                            <input type="text" name="telefone_2" placeholder="(11) 98888-8888" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:ring-2 focus:ring-pink-500 outline-none">
                        </div>
                    </div>

                    <div class="border-t border-gray-800 pt-4 mt-4">
                        <h4 class="text-sm font-bold text-gray-300 mb-3">Fotos de Perfil</h4>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-xs font-medium text-gray-400 mb-1">Foto do Casal</label>
                                <input type="file" name="foto_casal" accept="image/*" class="w-full text-xs text-gray-400 file:mr-2 file:py-1 file:px-2 file:rounded-md file:border-0 file:bg-gray-800 file:text-gray-300 hover:file:bg-gray-700">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-400 mb-1">Foto Cônjuge 1</label>
                                <input type="file" name="foto_conjuge_1" accept="image/*" class="w-full text-xs text-gray-400 file:mr-2 file:py-1 file:px-2 file:rounded-md file:border-0 file:bg-gray-800 file:text-gray-300 hover:file:bg-gray-700">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-400 mb-1">Foto Cônjuge 2</label>
                                <input type="file" name="foto_conjuge_2" accept="image/*" class="w-full text-xs text-gray-400 file:mr-2 file:py-1 file:px-2 file:rounded-md file:border-0 file:bg-gray-800 file:text-gray-300 hover:file:bg-gray-700">
                            </div>
                        </div>
                    </div>

                </div>
                <div class="px-6 py-4 bg-gray-800/50 flex justify-end gap-3 border-t border-gray-800">
                    <button type="button" @click="open = false" class="px-4 py-2 text-gray-400 hover:text-white transition-colors">Cancelar</button>
                    <button type="submit" class="px-6 py-2 bg-gradient-to-r from-pink-600 to-rose-600 hover:from-pink-500 hover:to-rose-500 text-white rounded-lg font-bold shadow-[0_0_15px_rgba(225,29,72,0.3)] transition-all">Salvar Casal</button>
                </div>
            </form>
        </div>
    </div>
</div>
