<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso - Assinatura Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #030712; color: white; }</style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-4">

    <div class="max-w-lg w-full bg-gray-900/40 backdrop-blur-md border border-white/10 rounded-2xl shadow-xl overflow-hidden text-center p-10">
        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        
        <h1 class="text-2xl font-bold text-white mb-2">Documento Assinado com Sucesso!</h1>
        <p class="text-gray-300 mb-6">Obrigado por preencher. O documento foi congelado em formato PDF para segurança.</p>
        
        <p class="text-sm text-gray-400 mb-8 border border-white/10 bg-gray-900/40 backdrop-blur-md p-4 rounded-lg">
            Nós enviamos uma via do PDF assinado para o seu e-mail: <b>{{ doc.email_destino }}</b>.
        </p>
        
        <a href="{{ doc.arquivo_pdf_final.url }}" target="_blank" class="block w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-colors">
            Baixar minha cópia PDF agora
        </a>
        <p class="mt-8 text-xs text-gray-400">PV Enseada &copy; Todos os Direitos Reservados</p>
    </div>

</body>
</html>
