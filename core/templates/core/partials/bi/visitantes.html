<div class="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fade-in-up">
    <!-- Funil -->
    <div class="bg-gray-800/80 backdrop-blur border border-blue-500/30 p-6 rounded-2xl shadow-lg relative overflow-hidden group">
        <div class="absolute -right-4 -top-4 opacity-10 group-hover:scale-110 transition"><i data-lucide="filter" class="w-32 h-32"></i></div>
        <h3 class="text-gray-400 font-bold mb-1">Taxa de Conversão Real (Visitante -> Membro)</h3>
        <p class="text-5xl font-black text-blue-400">{{ taxa_conversao }}%</p>
        <p class="text-sm text-gray-500 mt-2">De {{ visitantes_total }} visitantes históricos.</p>
    </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6 animate-fade-in-up" style="animation-delay: 100ms;">
    <!-- Bairros Heatmap -->
    <div class="bg-gray-800/80 backdrop-blur p-6 rounded-2xl border border-white/10 shadow-lg">
        <h3 class="text-white font-bold mb-4">Demografia (Top Bairros)</h3>
        <div class="h-64 relative"><canvas id="chartVisitantesBairros"></canvas></div>
    </div>

    <!-- Origem Radar -->
    <div class="bg-gray-800/80 backdrop-blur p-6 rounded-2xl border border-white/10 shadow-lg">
        <h3 class="text-white font-bold mb-4">Fontes de Atração de Tráfego Novo</h3>
        <div class="h-64 relative"><canvas id="chartVisitantesOrigem"></canvas></div>
    </div>
</div>

<script>
    lucide.createIcons();
    new Chart(document.getElementById('chartVisitantesBairros').getContext('2d'), {
        type: 'bar',
        data: { labels: {{ bairro_labels|safe }}, datasets: [{ label: 'Visitantes', data: {{ bairro_data|safe }}, backgroundColor: '#0ea5e9', borderRadius: 4 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: {color: 'rgba(255,255,255,0.05)'}, ticks: {color: '#9ca3af'} }, x: { grid: {display: false}, ticks: {color: '#9ca3af'} } } }
    });

    new Chart(document.getElementById('chartVisitantesOrigem').getContext('2d'), {
        type: 'polarArea',
        data: { labels: {{ origem_labels|safe }}, datasets: [{ data: {{ origem_data|safe }}, backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#8b5cf6', '#ef4444', '#ec4899'], borderWidth: 1, borderColor: '#1f2937' }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: {color: '#9ca3af', font: {size: 10}} } }, scales: { r: { ticks: {display: false}, grid: {color: 'rgba(255,255,255,0.05)'} } } }
    });
</script>
