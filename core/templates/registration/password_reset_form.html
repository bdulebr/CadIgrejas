{% extends 'registration/password_reset_base.html' %}
{% block auth_content %}
    <h2 class="text-2xl font-bold text-white mb-2">Esqueceu a senha?</h2>
    <p class="text-gray-400 text-sm mb-6">Digite seu e-mail cadastrado na Intranet. Se ele for válido, enviaremos um link criptografado para redefinição.</p>
    
    <form method="post" class="space-y-5">
        {% csrf_token %}
        <div>
            <label class="block text-xs font-semibold text-gray-400 tracking-wider uppercase mb-1.5">E-mail</label>
            <input type="email" name="email" required placeholder="seu.email@exemplo.com"
                   class="w-full px-4 py-3.5 rounded-xl bg-gray-950/60 border border-gray-700/80 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-white placeholder-gray-600 transition-all shadow-inner outline-none">
        </div>
        
        {{ form.email.errors }}

        <button type="submit" 
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg hover:shadow-blue-500/30 transition-all transform hover:-translate-y-0.5 active:translate-y-0 uppercase tracking-widest text-sm">
            Enviar Token de Acesso
        </button>
    </form>
{% endblock %}
