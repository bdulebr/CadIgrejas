{% extends 'core/base.html' %}
{% load static %}

{% block title %}{{ page_title }} - Intranet PVE{% endblock title %}

{% block content %}
<div class="relative h-screen w-full bg-cover bg-center bg-no-repeat overflow-hidden flex items-center justify-center"
     style="background-image: url('{% static 'img/bg_igreja.png' %}');">

    <!-- Dark/Blue Overlay -->
    <div class="absolute inset-0 bg-blue-950/70 backdrop-blur-md z-0"></div>

    <!-- Center Card -->
    <div class="relative z-10 w-full max-w-md mx-auto px-4">

        <div class="mb-8 flex flex-col items-center justify-center text-center">
            <img src="{% static 'img/logo.jpg' %}" alt="Logo PV" class="h-20 w-auto rounded-xl shadow-[0_0_30px_rgba(255,255,255,0.2)] mb-4">
            <h1 class="text-3xl font-extrabold text-white tracking-tight drop-shadow-lg">Recuperação Segura</h1>
            <p class="text-blue-100/90 text-sm font-medium tracking-wide mt-1">Acesso Zero-Trust</p>
        </div>

        <div class="bg-gray-900/60 backdrop-blur-xl border border-gray-700/50 rounded-[2rem] p-8 shadow-2xl relative overflow-hidden">
            <!-- Top edge highlight -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500 opacity-80"></div>

            {% block auth_content %}{% endblock %}
        </div>

        <div class="mt-6 text-center">
            <a href="{% url 'login' %}" class="text-sm font-semibold text-gray-400 hover:text-white transition-colors">Voltar para o Login Seguro</a>
        </div>
    </div>
</div>
{% endblock content %}
