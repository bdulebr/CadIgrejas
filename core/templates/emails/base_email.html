<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PV Enseada Intranet</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f3f4f6; color: #1f2937; margin: 0; padding: 0; }
        .container { max-w-lg mx-auto bg-white/5 backdrop-blur-md text-white margin: 40px auto; padding: 0; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); max-width: 600px; }
        .header { background-color: #14532d; padding: 24px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-size: 24px; letter-spacing: 1px; }
        .header p { color: #dcfce7; margin: 5px 0 0 0; font-size: 12px; text-transform: uppercase; }
        .content { padding: 32px 24px; background-color: #ffffff; line-height: 1.6; }
        .footer { background-color: #f9fafb; padding: 24px; text-align: center; border-top: 1px solid #e5e7eb; font-size: 12px; color: #6b7280; }
        .btn { display: inline-block; padding: 12px 24px; background-color: #16a34a; color: #ffffff !important; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 16px; }
        .alert-red { background-color: #fee2e2; border-left: 4px solid #ef4444; padding: 12px; color: #991b1b; border-radius: 4px; margin: 16px 0; }
        .alert-yellow { background-color: #fef3c7; border-left: 4px solid #f59e0b; padding: 12px; color: #92400e; border-radius: 4px; margin: 16px 0; }
        .alert-blue { background-color: #eff6ff; border-left: 4px solid #3b82f6; padding: 12px; color: #1e40af; border-radius: 4px; margin: 16px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PV ENSEADA</h1>
            <p>Sistema Intranet Administrativa</p>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            <p>Você está recebendo este e-mail pois está cadastrado na Intranet da PV Enseada.</p>
            <p>Não responda a este e-mail. Ele foi gerado automaticamente pelo motor do sistema.</p>
        </div>
    </div>
</body>
</html>
