upstream web_app {
    server web:8000;
}

server {
    listen 80;
    server_name intranet.pvenseda.org intranet.pvenseada.org www.intranet.pvenseada.org;

    client_max_body_size 100M;

    # O Nginx serve os arquivos estáticos diretamente, aliviando o Gunicorn
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # O Nginx serve os arquivos de mídia (uploads) diretamente
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Todo o resto vai para o Django (Gunicorn)
    location / {
        proxy_pass http://web_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;

        # O Django precisa saber se o Nginx recebeu via HTTPS ou HTTP
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
