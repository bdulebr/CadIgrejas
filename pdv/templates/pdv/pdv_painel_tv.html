{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel TV - Pedidos PDV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background-color: #000; overflow: hidden; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .slide-in { animation: slide 0.5s ease-out; }
        @keyframes slide { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="text-white h-screen flex flex-col" x-data="kdsTV()">

    <header class="bg-gray-900 border-b-4 border-yellow-500 p-4 flex justify-between items-center shadow-2xl shrink-0">
        <h1 class="text-4xl font-black text-yellow-400 tracking-widest uppercase flex items-center gap-4">
            <i data-lucide="utensils" class="w-12 h-12"></i>
            STATUS DOS PEDIDOS
        </h1>
        <div class="text-2xl font-bold text-gray-400" x-text="clock"></div>
    </header>

    <div class="flex-1 grid grid-cols-2 gap-4 p-4 overflow-hidden bg-gradient-to-b from-gray-900 to-black">

        <!-- Em Preparo -->
        <div class="bg-gray-800/80 rounded-2xl border-2 border-gray-700 flex flex-col shadow-xl overflow-hidden">
            <div class="bg-gray-700 p-4 text-center">
                <h2 class="text-5xl font-black text-gray-100 uppercase tracking-widest">EM PREPARO</h2>
            </div>
            <div class="flex-1 p-6 grid grid-cols-1 gap-4 content-start overflow-y-auto" style="grid-auto-rows: min-content;">
                <template x-for="p in preparo" :key="p.id">
                    <div class="bg-gray-900 border border-gray-600 rounded-xl p-6 text-center shadow-lg slide-in">
                        <span class="text-5xl font-black text-yellow-500 truncate block" x-text="p.nome"></span>
                    </div>
                </template>
                <div x-show="preparo.length === 0" class="text-center text-gray-600 text-3xl font-bold mt-20">Nenhum pedido na fila</div>
            </div>
        </div>

        <!-- A Retirar -->
        <div class="bg-green-900/40 rounded-2xl border-2 border-green-600 flex flex-col shadow-[0_0_50px_rgba(22,163,74,0.3)] overflow-hidden">
            <div class="bg-green-700 p-4 text-center blink">
                <h2 class="text-5xl font-black text-white uppercase tracking-widest">PRONTO / RETIRAR</h2>
            </div>
            <div class="flex-1 p-6 grid grid-cols-1 gap-4 content-start overflow-y-auto" style="grid-auto-rows: min-content;">
                <template x-for="p in retirar" :key="p.id">
                    <div class="bg-green-600 border border-green-400 rounded-xl p-6 text-center shadow-lg slide-in">
                        <span class="text-5xl font-black text-white truncate block" x-text="p.nome"></span>
                    </div>
                </template>
            </div>
        </div>

    </div>

    <!-- Audio para notificação -->
    <audio id="bell" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=ding-idea-40142.mp3" preload="auto"></audio>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('kdsTV', () => ({
                preparo: [],
                retirar: [],
                clock: '',
                lastRetirarCount: 0,

                init() {
                    lucide.createIcons();
                    this.updateClock();
                    setInterval(() => this.updateClock(), 1000);
                    this.fetchData();
                    setInterval(() => this.fetchData(), 3000);
                },

                updateClock() {
                    this.clock = new Date().toLocaleTimeString('pt-BR');
                },

                async fetchData() {
                    try {
                        const res = await fetch("{% url 'api_tv_data' %}");
                        const data = await res.json();
                        this.preparo = data.preparo;

                        if(data.retirar.length > this.lastRetirarCount && this.lastRetirarCount !== 0) {
                            document.getElementById('bell').play().catch(e => {}); // Play sound when new item to retire
                        }
                        this.lastRetirarCount = data.retirar.length;
                        this.retirar = data.retirar;
                    } catch(e) {}
                }
            }));
        });
    </script>
</body>
</html>
